<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Competitive 13-Card Pusoy">

  <!-- Edge-to-edge, no zoom; cover the notch/safe areas like a native app. -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0A0E21">

  <!-- Fullscreen "app" mode when added to the home screen (iOS + Android). -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Pusoy Tayo">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Pusoy Tayo</title>
  <link rel="manifest" href="manifest.json">
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #0A0E21;
      overflow: hidden; overscroll-behavior: none; }
  </style>
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script>
    // Go fullscreen on the first tap/click (browsers only allow it from a user
    // gesture). iOS Safari ignores this — there the PWA meta tags + "Add to
    // Home Screen" give the fullscreen, native-like experience instead.
    (function () {
      function goFullscreen() {
        var el = document.documentElement;
        var req = el.requestFullscreen || el.webkitRequestFullscreen ||
          el.mozRequestFullScreen || el.msRequestFullscreen;
        if (req && !document.fullscreenElement) {
          req.call(el).catch(function () {});
        }
        window.removeEventListener('pointerdown', goFullscreen);
      }
      window.addEventListener('pointerdown', goFullscreen);
    })();
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
